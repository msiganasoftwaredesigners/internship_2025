<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mar</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black ">

  <div class="flex flex-col-reverse lg:flex-row lg:items-start px-6 py-14 gap-24">
    
    <!-- Image (Bottom on phone, right side on desktop) -->
    <img 
      src="drinkminna-1000w.jpg" 
      alt="Exact size" 
      class="w-full max-w-[525px] h-auto rounded shadow"
    />

    <!-- Text (Top on phone, left on desktop) -->
    <div class=" max-w-md mt-20 pl-6">
      <h2 class="text-white font-bold  mb-4">
        Made with Squarespace 
      </h2>
      <p class="text-base text-white sm:text-lg mb-4">
        Get inspired by a collection of websites made by Squarespace users.
      </p>

      <!-- External CSS for Squarespace styling -->
      <link rel="stylesheet" href="https://static1.squarespace.com/static/ta/5134cbefe4b0c6fb04df8065/12782/assets/styles/globals.css?12783" id="global-stylesheet">
      <link rel="stylesheet" href="https://static1.squarespace.com/static/ta/5134cbefe4b0c6fb04df8065/12782/assets/styles/components/link.css">
      <!-- Browse Templates Link -->
      <a 
        class="link link--has-anchor-animation inline-flex items-center gap-2 text-white  transition duration-300"
        href="/templates"
        aria-label="Browse Squarespace templates"
      >
        <span class="link__text ">
          Browse Templates
          <span aria-hidden="true" data-arrow="true" class="ml-2">
            <span>→</span>
            <span>→</span>
          </span>
        </span>
      </a>
    </div>
  </div>

</body>
</html>
